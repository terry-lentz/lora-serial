name: Release

# Tag a commit (e.g. `git tag v0.1.0 && git push --tags`) to build all firmware
# variants, package flashable images, and publish a GitHub Release with auto notes.
on:
  push:
    tags: ['v*']

permissions:
  contents: write   # needed to create the release

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install PlatformIO + esptool
        # Pin esptool <5: the merge_bin subcommand and --flash_* option names below
        # are the v4 CLI; esptool 5.x renamed them (merge-bin, --flash-*).
        run: pip install --upgrade platformio "esptool<5"

      - name: Native tests (gate the release)
        run: pio test -e native

      - name: Build + package flashable firmware
        run: |
          set -euo pipefail
          mkdir -p dist
          ver="${GITHUB_REF_NAME}"            # the release tag, e.g. v0.1.0
          for env in node_raw; do
            pio run -e "$env"
            d=".pio/build/$env"
            # boot_app0.bin ships with the ESP32 Arduino framework, which is only
            # installed once the `pio run` above fetches it — so resolve the path
            # here, after the build, not before it.
            BOOT_APP0="$(find ~/.platformio/packages -name boot_app0.bin | head -1)"
            if [ -z "$BOOT_APP0" ]; then
              echo "::error::boot_app0.bin not found under ~/.platformio/packages" >&2
              exit 1
            fi
            # Version-stamped names so a downloaded file is unambiguous.
            # .firmware.bin = the complete factory image (flash at 0x0; boots a
            # blank chip). .app.bin = the app partition only (OTA / advanced).
            esptool.py --chip esp32s3 merge_bin \
              -o "dist/lora-serial-${ver}.firmware.bin" \
              --flash_mode keep --flash_freq keep --flash_size keep \
              0x0 "$d/bootloader.bin" \
              0x8000 "$d/partitions.bin" \
              0xe000 "$BOOT_APP0" \
              0x10000 "$d/firmware.bin"
            cp "$d/firmware.bin" "dist/lora-serial-${ver}.app.bin"
          done
          # Wio Tracker L1 (nRF52840 display node): build the wio_l1 env and wrap
          # its .hex into a .uf2 for the Adafruit UF2 bootloader (family
          # 0xADA52840). tools/make_uf2.sh resolves uf2conv from the framework
          # that the build above just installed.
          pio run -e wio_l1
          tools/make_uf2.sh wio_l1 "dist/lora-serial-${ver}.wio_tracker_l1.uf2"
          (cd dist && sha256sum *.bin *.uf2 > SHA256SUMS.txt)
          ls -l dist

      - name: Flashing instructions (release body prefix)
        run: |
          ver="${GITHUB_REF_NAME}"
          cat > RELEASE_BODY.md <<'EOF'
          ## Flashing (no toolchain needed)

          Both boards run the **same firmware** and auto-elect their half-duplex
          role from their chip MACs at boot — nothing per-board to configure. The
          two boards flash **differently**, so grab the image for **your** board
          below and verify it against `SHA256SUMS.txt`.

          ### XIAO ESP32-S3 node

          Download **`lora-serial-__VERSION__.firmware.bin`** — the complete factory
          image (bootloader + partitions + app; boots a blank chip).

          - **Easiest — web flasher:** open https://espressif.github.io/esptool-js/ ,
            connect the board, and flash it at offset **`0x0`**.
          - **Or esptool:**
            ```bash
            esptool.py --chip esp32s3 write_flash 0x0 lora-serial-__VERSION__.firmware.bin
            ```

          Flash the same file to each XIAO. (Also included:
          **`lora-serial-__VERSION__.app.bin`** — the app partition only, for OTA or
          re-flashing just the app; flash at `0x10000`, won't boot a blank chip.)

          ### Wio Tracker L1 display node

          Download **`lora-serial-__VERSION__.wio_tracker_l1.uf2`**. This board uses
          the Adafruit **UF2 bootloader** — no esptool needed:

          1. Put it in DFU: **double-click the RST button** — a `TRACKER L1` USB
             drive mounts.
          2. **Copy the `.uf2` onto that drive.** It writes flash and reboots.

          Pins / SoftDevice / OLED wiring:
          [docs/WIO_TRACKER_L1.md](https://github.com/terry-lentz/lora-serial/blob/main/docs/WIO_TRACKER_L1.md).

          ### After flashing

          The pair auto-pairs + encrypts and runs on the reliable `medium` mode.
          Watch the L1's screen, or open a serial terminal on the XIAO. To change a
          setting: `+++`, then e.g. `AT+MODE=medium`, `AT&W` — see the README for
          modes, AT commands, and the login-terminal setup.

          ---
          EOF
          sed -i "s/__VERSION__/${ver}/g" RELEASE_BODY.md

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          body_path: RELEASE_BODY.md
          files: |
            dist/*.bin
            dist/*.uf2
            dist/SHA256SUMS.txt
