<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" width="800"
     height="300" font-family="-apple-system, Segoe UI, Roboto, sans-serif">
  <title>Wio Tracker L1 status-bar legend</title>
  <rect x="1" y="1" width="798" height="298" rx="10" fill="#0b0b0b"
        stroke="#30363d"/>
  <text x="28" y="32" font-size="15" font-weight="700"
        fill="#f4f4f4">Wio Tracker L1 — status bar</text>

  <!-- the OLED status bar (inverted: white bar, black content) -->
  <rect x="48" y="46" width="704" height="58" rx="7" fill="#000000"
        stroke="#2a2a2a"/>
  <rect x="52" y="50" width="696" height="50" rx="4" fill="#f4f4f4"/>

  <!-- frequency -->
  <text x="66" y="86" font-size="30" font-weight="700"
        font-family="ui-monospace, Menlo, Consolas, monospace"
        fill="#0b0b0b">921.0</text>
  <!-- encryption padlock -->
  <g fill="#0b0b0b">
    <path d="M242 66 a8 8 0 0 1 16 0 v6 h-4 v-6 a4 4 0 0 0 -8 0 v6 h-4 z"/>
    <rect x="240" y="72" width="20" height="16" rx="2"/>
    <circle cx="250" cy="79" r="2" fill="#f4f4f4"/>
  </g>
  <!-- mode / speed -->
  <text x="352" y="86" font-size="30" font-weight="700"
        font-family="ui-monospace, Menlo, Consolas, monospace"
        fill="#0b0b0b">medium</text>
  <!-- signal meter -->
  <g fill="#0b0b0b">
    <rect x="520" y="84" width="8" height="10"/>
    <rect x="531" y="78" width="8" height="16"/>
    <rect x="542" y="72" width="8" height="22"/>
    <rect x="553" y="66" width="8" height="28"/>
    <rect x="564" y="60" width="8" height="34"/>
  </g>
  <!-- TX up / RX down arrows -->
  <path d="M596 90 H612 L604 62 Z" fill="#0b0b0b"/>
  <path d="M620 62 H636 L628 90 Z" fill="#0b0b0b"/>
  <!-- heartbeat -->
  <path d="M690 90 C684 82 675 80 675 72 C675 67 680 64 684 67 C687 69 690 72
           690 72 C690 72 693 69 696 67 C700 64 705 67 705 72 C705 80 696 82
           690 90 Z" fill="#0b0b0b"/>

  <!-- leader lines -->
  <g stroke="#8b949e" stroke-width="1.5" fill="none">
    <path d="M112 104 V150"/>
    <path d="M250 104 V196"/>
    <path d="M405 104 V150"/>
    <path d="M545 104 V196"/>
    <path d="M614 104 V150"/>
    <path d="M690 104 V196"/>
  </g>
  <g fill="#8b949e">
    <circle cx="112" cy="104" r="2.5"/>
    <circle cx="250" cy="104" r="2.5"/>
    <circle cx="405" cy="104" r="2.5"/>
    <circle cx="545" cy="104" r="2.5"/>
    <circle cx="614" cy="104" r="2.5"/>
    <circle cx="690" cy="104" r="2.5"/>
  </g>

  <!-- labels -->
  <g text-anchor="middle">
    <text x="112" y="168" font-size="15" font-weight="700"
          fill="#f4f4f4">Frequency</text>
    <text x="112" y="185" font-size="12" fill="#9aa4ae">carrier, MHz</text>
    <text x="405" y="168" font-size="15" font-weight="700"
          fill="#f4f4f4">Speed / mode</text>
    <text x="405" y="185" font-size="12" fill="#9aa4ae">turbo … far</text>
    <text x="614" y="168" font-size="15" font-weight="700"
          fill="#f4f4f4">TX / RX</text>
    <text x="614" y="185" font-size="12" fill="#9aa4ae">activity</text>

    <text x="250" y="222" font-size="15" font-weight="700"
          fill="#f4f4f4">Encryption</text>
    <text x="250" y="239" font-size="12" fill="#9aa4ae">crossed = off</text>
    <text x="545" y="222" font-size="15" font-weight="700"
          fill="#f4f4f4">Signal</text>
    <text x="545" y="239" font-size="12" fill="#9aa4ae">strength (RSSI)</text>
    <text x="690" y="222" font-size="15" font-weight="700"
          fill="#f4f4f4">Heartbeat</text>
    <text x="690" y="239" font-size="12" fill="#9aa4ae">pulses on RX =</text>
    <text x="690" y="255" font-size="12" fill="#9aa4ae">link alive</text>
  </g>
</svg>
