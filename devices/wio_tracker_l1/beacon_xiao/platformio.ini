; ===========================================================================
; Bench beacon — XIAO ESP32S3 + Wio-SX1262 raw-LoRa transmitter.
;
; Test companion to the Wio Tracker L1 receive-and-display node (../). Transmits
; a labeled packet once a second on OUR PHY so the L1 receiver has something to
; hear, WITHOUT the full ARQ/encryption stack. Same radio silicon (Wio-SX1262)
; as the L1, so RF interop reduces to "do the pins + PHY params match".
;
; This TEMPORARILY replaces node_raw on one XIAO; restore it afterward with
;   make flash PORT=/dev/ttyACMx
; Build + flash (use the repo's flasher for the XIAO's native-USB reset quirk):
;   pio run -d devices/wio_tracker_l1/beacon_xiao
;   # stage the bins into <repo>/.pio/build/xiao_beacon, then:
;   tools/upload_flash.sh xiao_beacon /dev/ttyACM0
; ===========================================================================
[env:xiao_beacon]
platform = espressif32 @ 7.0.1
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
build_flags =
    -D ARDUINO_USB_MODE=0          ; TinyUSB CDC (matches node_raw) for clean logs
    -D ARDUINO_USB_CDC_ON_BOOT=1
lib_deps =
    jgromes/RadioLib @ ^7.7.1      ; pinned to match the main firmware
