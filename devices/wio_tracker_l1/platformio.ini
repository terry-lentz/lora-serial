; ===========================================================================
; Seeed Wio Tracker L1 Pro (nRF52840 + SX1262) — receive-and-display node.
;
; WORK IN PROGRESS (see README.md / WIP.md). A second hardware target for this
; project: an nRF52840 board with a 1.3" SH1106 OLED that receives over LoRa and
; shows the data on-screen. It shares the portable link core in
; ../../lib/linklayer (not yet wired in — currently a raw-PHY receive spike).
;
; Build:   pio run -d devices/wio_tracker_l1
; Flash:   autonomous via the UF2 bootloader — 1200-baud touch to DFU, then drop
;          .pio/build/wio_l1/firmware.uf2 onto the mounted drive (see README).
;
; The L1's resident SoftDevice is S140 7.3.0, so the app links at 0x27000 (NOT
; the Adafruit Feather's v6.1.1 @ 0x26000 — that lands inside the SoftDevice and
; faults at boot in a reset loop). The v7 linker script is shipped in linker/ and
; installed into the framework by the pre-build hook scripts/install_ldscript.py,
; so a fresh checkout builds cleanly even after a framework reinstall.
; ===========================================================================
[env:wio_l1]
platform = nordicnrf52
board = seeed_wio_tracker_L1        ; custom def (boards/) targeting S140 7.3.0
framework = arduino
; Use the vendored Meshtastic pin map (variants/seeed_wio_tracker_L1/) so D0..D18
; and the SX126X_*/OLED defines resolve to the L1's physical nRF52 GPIOs.
board_build.variant = seeed_wio_tracker_L1
board_build.variants_dir = variants
monitor_speed = 115200
; Ensure the S140 v7 linker script is present in the framework before linking.
extra_scripts = pre:scripts/install_ldscript.py
lib_deps =
    ; The 1.3" panel is an SH1106 (the SSD1306 driver paints only a shifted band
    ; on it — SH1106 ignores SSD1306 horizontal addressing).
    adafruit/Adafruit SH110X @ ^2.1.11
    adafruit/Adafruit GFX Library @ ^1.11.11
    jgromes/RadioLib @ ^7.7.1      ; SX1262 driver (pinned to match the main fw)
