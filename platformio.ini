; Reliable encrypted serial-cable transport over LoRa, between two identical
; XIAO ESP32S3 + Wio-SX1262 (B2B) kits.
;
; Both kits run the SAME firmware (the single `node_raw` env below). Each board
; auto-elects its half-duplex role (initiator/responder) and 1-byte address
; from its chip MAC (+ proximity pairing) at runtime — no per-board build.
; Build + flash both boards on their two ports:
;   pio run -e node_raw
;   pio run -e node_raw -t upload --upload-port /dev/ttyACM0
;   pio run -e node_raw -t upload --upload-port /dev/ttyACM1
;   pio device monitor -p /dev/ttyACM0 -b 115200

; Shared build flags (harmless on native too — just unused #defines there).
[env]
; Third-party (vendored) libraries live in lib/third_party/ — kept apart from our
; own code in lib/linklayer/. This puts each vendored dir on the include path so
; basename includes (e.g. "x25519.h", "heatshrink_encoder.h") still resolve.
lib_extra_dirs = lib/third_party
build_flags =
    -D RADIOLIB_DEBUG_BASIC=0
    -D CORE_DEBUG_LEVEL=0   ; silence Arduino core logs (keeps the raw-USB stream clean)
    -D ARDUINO_USB_MODE=0        ; TinyUSB OTG-CDC: real USB flow control (no FIFO drops)
                                 ; vs the board default =1 (USB-Serial/JTAG, tiny FIFO, drops on burst)
    ; USB descriptor identity: present as "LoRa-Serial" (not the default board
    ; name) so the device is self-identifying. The serial-number string already
    ; defaults to the chip's factory MAC, so /dev/serial/by-id reads e.g.
    ; usb-Open_LoRa-Serial_B8F862F9FA50 — product + unique MAC at a glance, which
    ; makes the two boards trivially distinguishable. "Open" = open-source.
    ; Compile-time only (no runtime USB code, no enumeration-timing risk).
    -D USB_PRODUCT=\"LoRa-Serial\"
    -D USB_MANUFACTURER=\"Open\"

; Device (ESP32) settings — hardware envs `extends = device`.
[device]
platform = espressif32
board = seeed_xiao_esp32s3
framework = arduino
monitor_speed = 115200
; RadioLib provides the SX1262 driver. Pin a known-good version rather than
; floating on latest so the ADR work later sits on a stable base.
lib_deps =
    jgromes/RadioLib @ ^7.7.1

; Native (host PC) build for unit tests of the portable link layer.
; Run:  pio test -e native
[env:native]
platform = native
build_src_filter = -<*>          ; don't build the Arduino firmware natively
build_flags =
    ${env.build_flags}
    -std=gnu++17
    -pthread                       ; threads for the faithful half-duplex sim
    -I lib/linklayer
    -I lib/third_party/heatshrink
    -I lib/third_party/x25519


; --------------------------------------------------------------------------
; Firmware — the "reliable LoRa serial cable". ONE env, flashed to BOTH boards:
; identical firmware on each end. They auto-elect the half-duplex initiator/
; responder role and their 1-byte addresses from their chip MACs (+ proximity
; pairing), so there is no per-board build (no NODE_A/NODE_B). Both ends are
; PLAIN USB serial ports (no host software); reliability = USB NAK back-pressure
; + radio Selective-Repeat ARQ. Defaults to the SF7/BW250 "medium" mode;
; override CFG_* to change the air config.
; Flash both boards:  make flash PORT=/dev/ttyACM0   (repeat for each port)
; --------------------------------------------------------------------------
[env:node_raw]
extends = device
build_flags =
    ${env.build_flags}
    -D MODEM
    -D USB_RAW
    -D CFG_SF=7
    -D CFG_BWCODE=1
    -D CFG_CR=5
    ; FEAT_DEFAULT (comp+enc+auto-power+ADR on; GFSK rung opt-in) is set
    ; in src/fw_config.h — single source of truth, see entry 28 of the journey.

