; Reliable encrypted serial-cable transport over LoRa, between two identical
; XIAO ESP32S3 + Wio-SX1262 (B2B) kits.
;
; Both kits run the SAME firmware (the single `node_raw` env below). Each board
; auto-elects its half-duplex role (initiator/responder) and 1-byte address
; from its chip MAC (+ proximity pairing) at runtime — no per-board build.
; Build + flash both boards on their two ports:
;   pio run -e node_raw
;   pio run -e node_raw -t upload --upload-port /dev/ttyACM0
;   pio run -e node_raw -t upload --upload-port /dev/ttyACM1
;   pio device monitor -p /dev/ttyACM0 -b 115200

; Shared build flags (harmless on native too — just unused #defines there).
[env]
; Third-party (vendored) libraries live in lib/third_party/ — kept apart from our
; own code in lib/linklayer/. This puts each vendored dir on the include path so
; basename includes (e.g. "x25519.h", "heatshrink_encoder.h") still resolve.
lib_extra_dirs = lib/third_party
build_flags =
    -D RADIOLIB_DEBUG_BASIC=0
    -D CORE_DEBUG_LEVEL=0   ; silence Arduino core logs (keeps the raw-USB stream clean)
    -D ARDUINO_USB_MODE=0        ; TinyUSB OTG-CDC: real USB flow control (no FIFO drops)
                                 ; vs the board default =1 (USB-Serial/JTAG, tiny FIFO, drops on burst)
    ; USB descriptor identity: present as "LoRa-Serial" (not the default board
    ; name) so the device is self-identifying. The serial-number string already
    ; defaults to the chip's factory MAC, so /dev/serial/by-id reads e.g.
    ; usb-Open_LoRa-Serial_B8F862F9FA50 — product + unique MAC at a glance, which
    ; makes the two boards trivially distinguishable. "Open" = open-source.
    ; Compile-time only (no runtime USB code, no enumeration-timing risk).
    -D USB_PRODUCT=\"LoRa-Serial\"
    -D USB_MANUFACTURER=\"Open\"

; Device (ESP32) settings — hardware envs `extends = device`.
[device]
; PIN the ESP32 platform (as we pin RadioLib below). Left floating (`espressif32`
; with no version), the arduino-esp32 core silently updates at build time and can
; change behavior under us: a newer core's USBCDC turned an ordinary terminal's
; DTR/RTS pulse into usb_persist_restart(RESTART_BOOTLOADER) — i.e. opening a
; serial monitor rebooted the board into download mode (issue #3). It had only
; "worked" because an older core didn't do that. Pinning keeps USB/reboot (and
; all) behavior reproducible; bump this deliberately, never by surprise.
platform = espressif32 @ 7.0.1
board = xiao_esp32s3_lora     ; custom def (boards/) — carries the LoRa pins
framework = arduino
monitor_speed = 115200
; The nRF52-only implementation files (built by [env:wio_l1]) must never enter
; an ESP32 build — exclude them from every device env (node_raw, usbprobe).
build_src_filter = +<*> -<platform/platform_nrf52.cpp> -<fw_diag_nrf52.cpp> -<fw_display.cpp>
; Stamp the firmware with its version (from the git tag) at build time — see
; tools/version.py. Reported by ATI (fw=...), AT+VER, and the boot banner.
extra_scripts = pre:tools/version.py
; RadioLib provides the SX1262 driver. Pin a known-good version rather than
; floating on latest so the ADR work later sits on a stable base.
lib_deps =
    jgromes/RadioLib @ ^7.7.1

; Native (host PC) build for unit tests of the portable link layer.
; Run:  pio test -e native
[env:native]
platform = native
build_src_filter = -<*>          ; don't build the Arduino firmware natively
build_flags =
    ${env.build_flags}
    -std=gnu++17
    -pthread                       ; threads for the faithful half-duplex sim
    -I lib/linklayer
    -I lib/third_party/heatshrink
    -I lib/third_party/x25519


; --------------------------------------------------------------------------
; Firmware — the "reliable LoRa serial cable". ONE env, flashed to BOTH boards:
; identical firmware on each end. They auto-elect the half-duplex initiator/
; responder role and their 1-byte addresses from their chip MACs (+ proximity
; pairing), so there is no per-board build (no NODE_A/NODE_B). Both ends are
; PLAIN USB serial ports (no host software); reliability = USB NAK back-pressure
; + radio Selective-Repeat ARQ. Defaults to the SF7/BW250 "medium" mode;
; override CFG_* to change the air config.
; Flash both boards:  make flash PORT=/dev/ttyACM0   (repeat for each port)
; --------------------------------------------------------------------------
[env:node_raw]
extends = device
build_flags =
    ${env.build_flags}
    -D MODEM
    -D USB_RAW
    -D CFG_SF=7
    -D CFG_BWCODE=1
    -D CFG_CR=5
    ; Feature defaults live in src/fw_config.h (single source of truth):
    ; FEAT_DEFAULT = comp+enc only (fixed 'medium' + full power out of the box;
    ; auto-power + ADR are opt-in/experimental, journey entry 34), and MAC_ROLE
    ; / PROX_PAIR default ON so this ONE image auto-elects roles + pairs on both
    ; boards (journey entry 35). Override any of them with -D here per env.

; --------------------------------------------------------------------------
; DIAGNOSTIC-ONLY image (NOT a release). A device->host USB probe: ignores the
; radio and streams self-labeling lines via several delivery methods, one a
; second, so you can watch a finicky USB host (e.g. an Android serial app) and
; see which method it actually reads. Provided by src/usb_probe.cpp; guarded by
; USB_PHONE_PROBE so it never touches the node_raw image. See issue #3.
;   pio run -e usbprobe -t upload --upload-port /dev/ttyACM0
; --------------------------------------------------------------------------
[env:usbprobe]
extends = device
build_flags =
    ${env.build_flags}
    -D USB_PHONE_PROBE

; --------------------------------------------------------------------------
; XIAO test peer for the nRF52 (wio_l1) bring-up: the SAME minimal interop
; config as [env:wio_l1] — no encryption/pairing, static roles, fixed 'medium'
; mode, 921 MHz — so a XIAO flashed with this links to the L1. This is a bench
; harness, not a release (node_raw is the real ESP32 image). NODE_ADDR=1 makes
; this XIAO the initiator (lower address); the L1 is addr 2, the responder.
;   make flash PORT=/dev/ttyACM0   (with the env swapped) — or:
;   tools/upload_flash.sh node_test /dev/ttyACM0
; --------------------------------------------------------------------------
[env:node_test]
extends = device
build_flags =
    ${env.build_flags}
    -D MODEM
    -D USB_RAW
    -D FEAT_DEFAULT=0        ; match wio_l1: no compression, no encryption
    -D MAC_ROLE=0            ; static roles (no MAC election)
    -D PROX_PAIR=0           ; no proximity pairing
    -D NODE_ADDR=1           ; this XIAO is the initiator; L1 peer = 2
    -D PEER_ADDR=2
    -D CFG_SF=7
    -D CFG_BWCODE=1
    -D CFG_CR=5
    -D CFG_FREQ=921.0f       ; match wio_l1 (2 MHz clear of the 923 pair)

; --------------------------------------------------------------------------
; Seeed Wio Tracker L1 (nRF52840 + SX1262 + 1.3" SH1106 OLED) — a receive-and-
; display node running the SAME firmware as node_raw (src/), on the nRF52
; platform layer (src/platform/platform_nrf52.cpp + fw_diag_nrf52.cpp). WORK IN
; PROGRESS (see devices/wio_tracker_l1/). Board def in boards/, pin map in
; variants/. Built for the L1's resident SoftDevice S140 7.3.0 (app @ 0x27000;
; the v7 linker script is installed into the framework by the pre-build hook
; tools/install_nrf52_ldscript.py). Flashed via the UF2 bootloader.
;
; First bring-up uses a MINIMAL interop config — no encryption, no pairing,
; static roles, fixed 'medium' mode, 921 MHz (2 MHz clear of a 923 pair) — so it
; can link to a XIAO built with matching flags. Build:  pio run -e wio_l1
; --------------------------------------------------------------------------
[env:wio_l1]
platform = nordicnrf52
board = seeed_wio_tracker_L1
framework = arduino
board_build.variant = seeed_wio_tracker_L1
board_build.variants_dir = variants
monitor_speed = 115200
extra_scripts =
    pre:tools/version.py
    pre:tools/install_nrf52_ldscript.py
; Build the shared firmware, minus the ESP32-only implementation files.
build_src_filter =
    +<*>
    -<platform/platform_esp32.cpp>
    -<fw_diag_esp32.cpp>
    -<usb_probe.cpp>
lib_extra_dirs = lib/third_party
lib_deps =
    jgromes/RadioLib @ ^7.7.1
    ; The L1's 1.3" panel is an SH1106 (fw_display.cpp, built only here).
    adafruit/Adafruit SH110X @ ^2.1.11
    adafruit/Adafruit GFX Library @ ^1.11.11
build_flags =
    -D RADIOLIB_DEBUG_BASIC=0
    -D USE_TINYUSB      ; the core's Wire lib pulls in Adafruit_TinyUSB.h
    -D MODEM
    -D USB_RAW
    ; --- minimal interop bring-up (no enc/pair, static roles, medium, 921) ---
    -D FEAT_DEFAULT=0        ; no compression, no encryption
    -D MAC_ROLE=0            ; static roles (no MAC-based election)
    -D PROX_PAIR=0           ; no proximity pairing
    -D NODE_ADDR=2           ; this node; peer (XIAO) = 1 and is the initiator
    -D PEER_ADDR=1
    -D CFG_SF=7              ; 'medium' preset
    -D CFG_BWCODE=1
    -D CFG_CR=5
    -D CFG_FREQ=921.0f       ; 2 MHz clear of the user's 923 MHz pair

